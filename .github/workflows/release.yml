name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"

permissions:
  id-token: write
  contents: write
  actions: write
  issues: write

jobs:
  build:
    uses: ./.github/workflows/production-build.yml
    secrets: inherit

  release:
    needs: build
    runs-on: ubuntu-22.04
    permissions:
      id-token: write
      contents: write # Allow creating releases
      actions: write # Allow workflow dispatch for website deployment
      issues: write # Allow commenting, labeling, and closing issues
    env:
      ZIG_GLOBAL_CACHE_DIR: .zig-cache-global
      ZIG_RELEASE_FOLDER: zig-out/release
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/flakehub-cache-action@main

      - name: Download all platform artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: final-*
          path: ${{ env.ZIG_RELEASE_FOLDER }}
          merge-multiple: true

      - name: Get version
        run: echo "VERSION=$(cat version.txt)" >> $GITHUB_ENV

      - name: Create GitHub release
        run: |
          nix develop --command zig build script:create-gh-release
          ls -la ${{ env.ZIG_RELEASE_FOLDER }}
          gh release upload v${{ env.VERSION }} ${{ env.ZIG_RELEASE_FOLDER }}/*
          gh release edit v${{ env.VERSION }} --draft=false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Sentry release
        uses: getsentry/action-release@v3
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        with:
          release: floe@${{ env.VERSION }}

      - name: Clean up awaiting-release labels
        run: nix develop --command just close-released-issues ${{ env.VERSION }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trigger website deployment
        if: success()
        run: |
          gh workflow run deploy-website.yml --ref main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - if: "!cancelled()"
        run: |
          icon=""
          if [ "${{ job.status }}" == "success" ]; then
            icon="✅"
          else
            icon="❌"
          fi
          status="$icon Floe release v${{ env.VERSION }}: ${{ job.status }}"
          curl -d "$status" "ntfy.sh/${{ secrets.NTFY_RELEASE_URL }}"
