# Trigger a full production build without creating any public release.
# Artifacts are available for download from the workflow run page.

name: Internal Build

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build:
    uses: ./.github/workflows/production-build.yml
    with:
      include-git-hash: true
    secrets: inherit
